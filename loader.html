<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'">
<title>n8n Local Desktop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep:       #0d0d0d;
    --bg-card:       #1a1a1a;
    --border:        #2a2a2a;
    --border-light:  #3a3a3a;
    --text-primary:  #f5f5f5;
    --text-secondary:#a3a3a3;
    --text-dim:      #666;
    --accent:        #FF6D5A;
    --accent-dim:    rgba(255,109,90,.15);
    --red-alert:     #ef4444;
    --terminal-bg:   #111;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    color: var(--text-primary);
    -webkit-app-region: drag;
    user-select: none;
  }

  /* ── Background ── */
  .bg {
    position: fixed; inset: 0;
    background: var(--bg-deep);
    z-index: 0;
  }
  .bg::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 50% 40% at 50% 0%, rgba(255,109,90,.05) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(255,109,90,.03) 0%, transparent 60%);
  }

  /* ── Wrapper ── */
  .wrapper {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; padding: 32px;
  }

  /* ── Brand ── */
  .brand {
    margin-bottom: 40px;
    animation: fadeIn .8s ease-out both;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-logo {
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -.02em;
    color: var(--accent);
    filter: drop-shadow(0 0 16px rgba(255,109,90,.4));
    animation: accentPulse 3s ease-in-out infinite;
  }

  .brand-separator {
    color: var(--border-light);
    font-size: 20px;
    font-weight: 300;
  }

  .brand-suffix {
    font-size: 14px;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: .08em;
    text-transform: lowercase;
  }

  @keyframes accentPulse {
    0%, 100% { filter: drop-shadow(0 0 10px rgba(255,109,90,.3)); }
    50%       { filter: drop-shadow(0 0 24px rgba(255,109,90,.6)); }
  }

  /* ── Card ── */
  .card {
    position: relative;
    width: 100%; max-width: 680px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
    animation: fadeSlideIn .6s .15s ease-out both;
  }

  /* ── Progress ── */
  .progress-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 32px 16px;
  }

  .loader {
    width: 40px; height: 40px;
    position: relative;
  }
  .loader svg {
    width: 100%; height: 100%;
    animation: spinRing 1.4s linear infinite;
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }

  .loader .track { stroke: var(--border); }
  .loader .arc   { stroke: var(--accent); stroke-linecap: round; }

  .loader.error svg { animation: none; }
  .loader.error .arc   { stroke: var(--red-alert); stroke-dasharray: 126; stroke-dashoffset: 0; }
  .loader.error .track { stroke: rgba(239,68,68,.2); }

  #status-text {
    font-size: 13px; font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: .02em;
    line-height: 1.4;
    text-align: center;
  }
  #status-text.error { color: var(--red-alert); }

  #log-line {
    font-size: 11.5px;
    color: var(--text-dim);
    letter-spacing: .02em;
    text-align: center;
    min-height: 1.4em;
    max-width: 580px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Retry button ── */
  .retry-wrap {
    display: none;
    margin-top: 20px;
    text-align: center;
    animation: fadeIn .3s ease-out both;
  }
  .retry-wrap.visible { display: block; }

  #retry-btn {
    -webkit-app-region: no-drag;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 400;
    padding: 9px 24px;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--accent-dim);
    color: var(--accent);
    cursor: pointer;
    letter-spacing: .04em;
    text-transform: lowercase;
    transition: all .15s;
  }
  #retry-btn:hover {
    background: rgba(255,109,90,.25);
    box-shadow: 0 0 16px rgba(255,109,90,.2);
  }
  #retry-btn:active { transform: scale(.97); }

  /* ── Close button ── */
  .close-btn {
    -webkit-app-region: no-drag;
    position: fixed;
    top: 14px; right: 16px;
    z-index: 10;
    width: 28px; height: 28px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 18px;
    line-height: 28px;
    text-align: center;
    cursor: pointer;
    border-radius: 6px;
    transition: all .15s;
  }
  .close-btn:hover {
    background: rgba(255,255,255,.08);
    color: var(--text-primary);
  }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <button class="close-btn" id="close-btn" title="Quit">&times;</button>
  <div class="bg"></div>
  <div class="wrapper">

    <div class="brand">
      <span class="brand-logo">n8n</span>
      <span class="brand-separator">&gt;</span>
      <span class="brand-suffix">Local, Desktop</span>
    </div>

    <div class="card">
      <div class="progress-area">
        <div class="loader" id="loader">
          <svg viewBox="0 0 44 44" fill="none">
            <circle class="track" cx="22" cy="22" r="20" stroke-width="2.5" fill="none"/>
            <circle class="arc"   cx="22" cy="22" r="20" stroke-width="2.5" fill="none"
                    stroke-dasharray="126" stroke-dashoffset="94"/>
          </svg>
        </div>
        <div id="status-text">initializing…</div>
        <div id="log-line"></div>
      </div>

      <div class="retry-wrap" id="retry-wrap">
        <button id="retry-btn">retry</button>
      </div>
    </div>

  </div>

<script>
  const statusEl  = document.getElementById('status-text');
  const logLineEl = document.getElementById('log-line');
  const loaderEl  = document.getElementById('loader');
  const retryWrap = document.getElementById('retry-wrap');
  const retryBtn  = document.getElementById('retry-btn');
  const closeBtn  = document.getElementById('close-btn');

  let cleanupStatus, cleanupLog, cleanupError;

  function setStatus(text) {
    statusEl.textContent = text;
    statusEl.classList.remove('error');
    loaderEl.classList.remove('error');
    retryWrap.classList.remove('visible');
  }

  function showLog(text) {
    logLineEl.textContent = text;
  }

  function setError(text) {
    statusEl.textContent = text;
    statusEl.classList.add('error');
    loaderEl.classList.add('error');
    retryWrap.classList.add('visible');
  }

  function bindListeners() {
    if (!window.electronAPI) return;
    cleanupStatus = window.electronAPI.onStatusUpdate(setStatus);
    cleanupLog    = window.electronAPI.onLogLine(showLog);
    cleanupError  = window.electronAPI.onError(setError);
  }

  function unbindListeners() {
    cleanupStatus?.();
    cleanupLog?.();
    cleanupError?.();
  }

  bindListeners();

  retryBtn.addEventListener('click', () => {
    unbindListeners();
    window.electronAPI?.retry();
    setStatus('retrying…');
    logLineEl.textContent = '';
    retryWrap.classList.remove('visible');
    bindListeners();
  });

  closeBtn.addEventListener('click', () => window.electronAPI?.quit());
</script>
</body>
</html>
